<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>rootnode_01</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--neon:#d300ff;
--blue:#00e1ff;
--bg:#050505;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
cursor:none;
}

body{
background:var(--bg);
color:white;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
}

/* 🖱️ CURSOR */
.cursor{
width:18px;
height:18px;
border-radius:50%;
position:fixed;
background:var(--neon);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
box-shadow:0 0 20px var(--neon);
}

/* 🎵 PROGRESS */
#music-progress{
position:fixed;
top:0;
left:0;
height:2px;
width:0%;
background:linear-gradient(90deg,var(--blue),var(--neon));
z-index:999;
}

/* 🌌 FONDO */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.95)),
url('42010.jpg');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:5rem;
letter-spacing:10px;
text-shadow:0 0 40px var(--neon);
}

.hero p{
margin-top:10px;
color:#aaa;
letter-spacing:4px;
}

/* SECTIONS */
section{
padding:120px 30px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
letter-spacing:6px;
color:#888;
margin-bottom:80px;
}

/* 🧊 GLASS */
.glass{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.05);
border-radius:25px;
padding:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 30px #00e1ff40;
}

.card h3{
font-family:'JetBrains Mono', monospace;
margin-bottom:15px;
}

.card p{
color:#777;
}

/* 🎮 PROYECTOS */
.project img{
width:100%;
border-radius:20px;
transition:0.4s;
}

.project img:hover{
transform:scale(1.05);
box-shadow:0 0 30px var(--neon);
}

/* 🔘 BOTONES */
.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
border:1px solid var(--neon);
border-radius:10px;
color:var(--neon);
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:var(--neon);
color:black;
box-shadow:0 0 20px var(--neon);
}

/* 🎧 PLAYER */
.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0a0a0a;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:0.9rem;
}

.player span{
color:#ccc;
}

/* reveal */
.reveal{
opacity:0;
transform:translateY(60px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

footer{
text-align:center;
padding:80px;
color:#333;
}

</style>
</head>

<body>

<div class="cursor"></div>
<div id="music-progress"></div>

<canvas id="bg"></canvas>

<audio id="audio" loop>
<source src="Súbete y Ya Verás(MP3_160K).mp3">
</audio>

<!-- HERO -->
<div class="hero">
<h1>rootnode_01</h1>
<p>future // developer</p>
</div>

<!-- STACK -->
<section class="reveal">
<h2>// stack</h2>

<div class="glass grid">

<div class="card">
<h3>01 / minecraft</h3>
<p>Optimización TPS y redes velocity.</p>
</div>

<div class="card">
<h3>02 / discord</h3>
<p>Bots avanzados y automatización.</p>
</div>

<div class="card">
<h3>03 / vps</h3>
<p>Infraestructura Linux.</p>
</div>

</div>
</section>

<!-- PROYECTOS -->
<section class="reveal">
<h2>// proyectos</h2>

<div class="grid">

<div class="project">
<img src="42010.jpg">
</div>

<div class="project">
<img src="42010.jpg">
</div>

</div>
</section>

<!-- CONTACTO -->
<section class="reveal">
<h2>// contacto</h2>
<div style="text-align:center;">
<a href="#" class="btn">Discord</a>
<a href="#" class="btn">GitHub</a>
</div>
</section>

<footer>// © 2026 // rootnode_01 //</footer>

<!-- PLAYER -->
<div class="player">
<span>Súbete y Ya Verás</span>
<span>▶</span>
</div>

<script>
// 🎵 audio
let audio=document.getElementById("audio");
let bar=document.getElementById("music-progress");

document.body.onclick=()=>{if(audio.paused)audio.play();}

audio.ontimeupdate=()=>{
bar.style.width=(audio.currentTime/audio.duration)*100+"%";
}

// 🖱️ cursor
let cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

// 🌌 partículas
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00e1ff";
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// scroll reveal
function reveal(){
document.querySelectorAll(".reveal").forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("active");
}
});
}
window.addEventListener("scroll",reveal);
</script>

</body>
</html>
