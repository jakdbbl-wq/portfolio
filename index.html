<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᴄʀɪꜱᴛɪᴀɴ | ᴅᴇᴠᴇʟᴏᴘᴇʀ</title>
    <style>
        /* Estilo Base */
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* Tarjeta con efecto Metálico */
        .card { 
            background: linear-gradient(145deg, #1a1a1a, #000); 
            border: 2px solid #ff0000; 
            box-shadow: 0 0 30px #660000; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            width: 85%; 
            max-width: 400px;
            position: relative;
        }

        /* Tipografía Small Caps */
        h1 { 
            color: #ff0000; 
            letter-spacing: 4px; 
            margin: 10px 0; 
            font-size: 2.5rem;
            text-shadow: 2px 2px 5px #000;
        }

        .tagline { 
            color: #aaa; 
            font-size: 14px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botón de Música */
        button { 
            background: linear-gradient(to bottom, #990000, #ff0000); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            cursor: pointer; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.4s; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        button:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff0000; 
        }

        /* Sección de Habilidades */
        .skills { 
            margin-top: 30px; 
            border-top: 1px dashed #444; 
            padding-top: 20px; 
            font-size: 13px; 
            color: #ff4d4d; 
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Animación de pulso para el borde */
        @keyframes glow {
            0% { box-shadow: 0 0 20px #660000; }
            50% { box-shadow: 0 0 40px #ff0000; }
            100% { box-shadow: 0 0 20px #660000; }
        }
        .card { animation: glow 3s infinite; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ᴄʀɪꜱᴛɪᴀɴ</h1>
        <p class="tagline">ᴍɪɴᴇᴄʀᴀꜰᴛ ɴᴇᴛᴡᴏʀᴋꜱ & ʙᴏᴛ ᴅᴇᴠᴇʟᴏᴘᴇʀ</p>
        
        <audio id="myAudio" loop>
            <source src="Súbete y Ya Verás(MP3_160K).mp3" type="audio/mpeg">
        </audio>
        
        <button onclick="toggleAudio()" id="btn">ᴘʟᴀʏ ᴍᴜꜱɪᴄ</button>

        <div class="skills">
            ᴠᴇʟᴏᴄɪᴛʏ • ɢᴇʏꜱᴇʀ • ᴠᴘꜱ • ᴘʏᴛʜᴏɴ
        </div>
    </div>

    <script>
        var audio = document.getElementById("myAudio");
        var btn = document.getElementById("btn");

        function toggleAudio() {
            if (audio.paused) { 
                audio.play(); 
                btn.innerHTML = "ᴘᴀᴜꜱᴇ ᴍᴜꜱɪᴄ"; 
            } else { 
                audio.pause(); 
                btn.innerHTML = "ᴘʟᴀʏ ᴍᴜꜱɪᴄ"; 
            }
        }
    </script>
</body>
</html>
