<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rootnode_01</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--neon:#d300ff;
--blue:#00e1ff;
--bg:#050505;
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none;}

body{
background:var(--bg);
color:white;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
}

/* 🧠 LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-family:'JetBrains Mono';
color:var(--blue);
font-size:1.2rem;
}

/* 🖱️ CURSOR */
.cursor{
width:18px;height:18px;border-radius:50%;
position:fixed;background:var(--neon);
pointer-events:none;z-index:999;
box-shadow:0 0 20px var(--neon);
}

/* 🎵 BARRA */
#music-progress{
position:fixed;top:0;left:0;height:2px;width:0%;
background:linear-gradient(90deg,var(--blue),var(--neon));
z-index:999;
}

/* 🌆 CIUDAD */
canvas{
position:fixed;
bottom:0;
left:0;
z-index:-1;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* 🔥 GLITCH */
.glitch{
font-size:5rem;
position:relative;
animation:glitch 1s infinite;
text-shadow:0 0 20px var(--neon);
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-2px,0);}
80%{transform:translate(2px,2px);}
100%{transform:translate(0);}
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#0a0a0a;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn{
cursor:pointer;
color:var(--blue);
}

/* SECCIONES */
section{padding:120px 30px;max-width:1100px;margin:auto;}

.glass{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border-radius:20px;
padding:40px;
}

/* reveal */
.reveal{opacity:0;transform:translateY(60px);transition:1s;}
.reveal.active{opacity:1;transform:translateY(0);}

footer{text-align:center;padding:80px;color:#333;}
</style>
</head>

<body>

<div id="loader">initializing system...</div>

<div class="cursor"></div>
<div id="music-progress"></div>

<canvas id="city"></canvas>

<audio id="audio" loop>
<source src="Súbete y Ya Verás(MP3_160K).mp3">
</audio>

<div class="hero">
<h1 class="glitch">rootnode_01</h1>
<p>future // developer</p>
</div>

<section class="reveal">
<div class="glass">
<h2>// stack</h2>
<p>minecraft / discord / vps</p>
</div>
</section>

<footer>// © 2026 // rootnode_01 //</footer>

<div class="player">
<span>Súbete y Ya Verás</span>
<span class="btn" onclick="togglePlay()">▶ / ❚❚</span>
</div>

<script>
// loader
setTimeout(()=>{document.getElementById("loader").style.display="none";},2000);

// cursor
let c=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
c.style.top=e.clientY+"px";
c.style.left=e.clientX+"px";
});

// audio
let audio=document.getElementById("audio");
let bar=document.getElementById("music-progress");

function togglePlay(){
if(audio.paused) audio.play(); else audio.pause();
}

audio.ontimeupdate=()=>{
bar.style.width=(audio.currentTime/audio.duration)*100+"%";
}

// ciudad animada
let canvas=document.getElementById("city");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=300;

function drawCity(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<50;i++){
let x=i*50;
let h=Math.random()*200;
ctx.fillStyle="#0ff2";
ctx.fillRect(x,canvas.height-h,30,h);
}

requestAnimationFrame(drawCity);
}
drawCity();

// scroll
function reveal(){
document.querySelectorAll(".reveal").forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("active");
}
});
}
window.addEventListener("scroll",reveal);
</script>

</body>
</html>
